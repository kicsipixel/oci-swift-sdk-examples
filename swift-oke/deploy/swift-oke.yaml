# swift-oke — OKE Workload Identity demo, with OCI Logging + OCI Monitoring.
#
# Prerequisites (one-time; see README for the OCI-side commands):
#   1. An ENHANCED OKE cluster (workload identity requires an enhanced cluster).
#   2. A condition-based `any-user` IAM policy authorizing this pod's workload
#      identity (namespace 'default', service account 'swift-oke', cluster OCID)
#      to read the bucket. OKE Workload Identity does NOT use dynamic groups.
#   3. For the telemetry env vars below, two more statements in that same policy,
#      in the same condition form: `use log-content` (PutLogs) and `use metrics`
#      (PostMetricData). Policy changes take up to ~15 minutes to take effect.
#
# No CA/trust-store step is needed: the signer pins the cluster CA in-process.
# Replace every <PLACEHOLDER> before applying. The two telemetry OCIDs
# (OCI_LOG_ID, OCI_COMPARTMENT_ID) ship **empty** on purpose: empty means "that
# backend is off", which is a working deployment, whereas a leftover placeholder
# string would build a batcher against an OCID you do not own and fail silently.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: swift-oke
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swift-oke
  namespace: default
  labels:
    app: swift-oke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swift-oke
  template:
    metadata:
      labels:
        app: swift-oke
    spec:
      serviceAccountName: swift-oke
      # Projects the SA token (/var/run/secrets/.../token) and the cluster CA
      # (/var/run/secrets/.../ca.crt) into the pod. Required for workload identity.
      automountServiceAccountToken: true
      # The app flushes its log and metric buffers on SIGTERM, after the HTTP
      # server has stopped. Budget for it, in the order main.swift actually
      # drains them: the log batcher's final PutLogs first, bounded by
      # maxAttempts x requestTimeout + maxCumulativeDelay (3 x 5s + 10s = 25s
      # with the settings in main.swift); then the metrics factory, which awaits
      # the in-flight step tick and posts once more, each PostMetricData bounded
      # to 5s by the transport main.swift injects (~10s). 45s leaves headroom;
      # the Kubernetes default of 30s would SIGKILL a slow final flush.
      terminationGracePeriodSeconds: 45
      containers:
        - name: swift-oke
          # Ready-to-run published image (linux/arm64 — matches OKE virtual nodes'
          # Arm pods). Swap for your own build on any registry the cluster can pull
          # from; see the README "Build & push the image" section.
          image: docker.io/iliasaz/swift-oke:observability
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: OCI_REGION
              value: "<region>" # e.g. us-phoenix-1
            - name: OCI_BUCKET
              value: "bucket-relay-bucket"
            - name: OCI_OBJECT
              value: "swift-oke-test.txt"
            # Optional: set the Object Storage namespace to skip the getNamespace()
            # call (and the extra permission it needs). Find it with `oci os ns get`.
            - name: OCI_NAMESPACE
              value: "<tenancy-object-storage-namespace>"
            # swift-log level for both the console and the OCI handler.
            - name: LOG_LEVEL
              value: "info"

            # --- Observability -------------------------------------------------
            # Both backends are opt-in and fail-soft: delete a variable (or leave
            # it empty) and that half simply stays off — stdout-only logging, no-op
            # metrics — while the service keeps serving. A misconfigured value
            # never breaks /health either; it is reported at startup and in
            # GET /telemetry.

            # OCID of a custom log in OCI Logging (Console: Logging > Log groups >
            # your log > OCID) — "ocid1.log.oc1.<region-key>.<...>". Nothing
            # validates it: a wrong OCID fails silently at flush time and only
            # shows up in GET /telemetry's counters, which is why this is empty
            # rather than a placeholder. Fill it in to turn OCI Logging on.
            - name: OCI_LOG_ID
              value: ""
            # Metric namespace. Lowercase [a-z][a-z0-9_]* only, and it must not
            # start with "oci_"/"oracle_" — the SDK rejects those at startup.
            # "swift-oke" would be rejected too (hyphens are not allowed).
            - name: OCI_METRICS_NAMESPACE
              value: "swift_oke"
            # Compartment the metric data is posted into — "ocid1.compartment.oc1..<...>".
            # Required together with OCI_METRICS_NAMESPACE; either one alone
            # leaves metrics off, which is the state this empty default selects.
            - name: OCI_COMPARTMENT_ID
              value: ""
          # The telemetry bootstrap (one proxymux token exchange) runs before the
          # listener binds, so give startup its own probe: until it succeeds the
          # liveness probe does not run at all, and the kubelet cannot restart a
          # container that is merely still starting. 12 x 5s = 60s, comfortably
          # more than the app's own 10s bootstrap deadline plus image start-up.
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
      # If pulling from a private OCIR repo, create a docker-registry secret and
      # reference it here:
      # imagePullSecrets:
      #   - name: ocir-secret
---
# Option B (README "Expose it publicly") — public HTTPS with TLS terminated
# directly at an OCI Load Balancer. Option A instead fronts the app with
# ingress-nginx + cert-manager for a real Let's Encrypt cert (see
# deploy/ingress-letsencrypt.yaml); that path uses the ClusterIP variant below.
#
# This is tuned for a Quick-Create, VIRTUAL-NODES-only cluster. On virtual nodes
# the LB backends are always the PODS (as <pod-ip>:<NodePort>), not the worker
# nodes — that's built-in, no annotation needed. See the README for the mechanism
# and the required subnet security rules (OKE never manages those on virtual nodes).
#
# For Option A — or any internal-only test without provisioning this LB — replace
# this whole Service with a minimal ClusterIP one, reachable in-cluster at
# http://swift-oke.default.svc.cluster.local:
#   spec:
#     type: ClusterIP
#     selector: { app: swift-oke }
#     ports: [{ port: 80, targetPort: 8080 }]
apiVersion: v1
kind: Service
metadata:
  name: swift-oke
  namespace: default
  annotations:
    # OKE never manages LB subnet security rules on virtual nodes — we create them
    # ourselves (see deploy/lb-security-rules.sh). "None" stops OKE from trying.
    service.beta.kubernetes.io/oci-load-balancer-security-list-management-mode: "None"
    # Flexible shape: min/max bandwidth in Mbps (bill scales with the min).
    service.beta.kubernetes.io/oci-load-balancer-shape: "flexible"
    service.beta.kubernetes.io/oci-load-balancer-shape-flex-min: "10"
    service.beta.kubernetes.io/oci-load-balancer-shape-flex-max: "100"
    # Terminate TLS at the LB on 443 using the Kubernetes TLS secret below.
    service.beta.kubernetes.io/oci-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/oci-load-balancer-tls-secret: "swift-oke-tls"
spec:
  type: LoadBalancer
  # For a stable address, reserve a public IP and pin it here (and set the LB
  # subnet's ingress accordingly):
  # loadBalancerIP: "<RESERVED_PUBLIC_IP>"
  selector:
    app: swift-oke
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: https
      port: 443
      targetPort: 8080
